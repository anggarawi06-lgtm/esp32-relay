<!DOCTYPE html>

<html>

<head>

<title>IoT Doorlock Login</title>

<style>

body{
font-family:Arial;
background:#1f2937;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:300px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>Login Dashboard</h2>

<input id="user" placeholder="username">
<input id="pass" type="password" placeholder="password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u=="admin" && p=="1234"){

localStorage.setItem("login","true")

window.location="dashboard.html"

}

else{

alert("Login gagal")

}

}

</script>

</body>

</html>
