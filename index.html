<!DOCTYPE html>

<html>

<head>

<title>IoT Smart Panel</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#ddd;
}

.container{
width:1200px;
margin:auto;
}

.box{
border:2px solid black;
padding:10px;
margin:10px;
background:white;
}

button{
padding:10px;
margin:3px;
}

.on{
background:lime;
}

.off{
background:red;
}

.row{
display:flex;
}

.col{
flex:1;
margin:5px;
}

</style>

</head>

<body>

<div class="container">

<h2>Smart IoT Dashboard</h2>

<div class="row">

<div class="box">
Lampu 1<br>
<button class="on" onclick="lamp(1,'ON')">ON</button>
<button class="off" onclick="lamp(1,'OFF')">OFF</button>
</div>

<div class="box">
Lampu 2<br>
<button class="on" onclick="lamp(2,'ON')">ON</button>
<button class="off" onclick="lamp(2,'OFF')">OFF</button>
</div>

<div class="box">
Lampu 3<br>
<button class="on" onclick="lamp(3,'ON')">ON</button>
<button class="off" onclick="lamp(3,'OFF')">OFF</button>
</div>

<div class="box">
Lampu 4<br>
<button class="on" onclick="lamp(4,'ON')">ON</button>
<button class="off" onclick="lamp(4,'OFF')">OFF</button>
</div>

</div>

<div class="row">

<div class="box col">
<h3>Pembacaan Suhu dan Kelembapan</h3>
Temp : <span id="temp">0</span><br>
Hum : <span id="hum">0</span>
</div>

<div class="box col">
<h3>Grafik suhu dan kelembapan</h3>
<canvas id="chart1"></canvas>
</div>

</div>

<div class="row">

<div class="box col">
<h3>Kelembapan tanah</h3>
<span id="soil">0</span>
</div>

<div class="box col">
<h3>Grafik kelembapan tanah</h3>
<canvas id="chart2"></canvas>
</div>

</div>

<div class="row">

<div class="box col">
<h3>RFID Access</h3>
UID : <span id="uid"></span>
</div>

<div class="box col">
<h3>Manual Doorlock</h3>
<button onclick="door()">OPEN DOOR</button>
</div>

</div>

<div class="box">
<h3>History Akses</h3>
<ul id="history"></ul>
</div>

</div>

<script>

const client=mqtt.connect(
'wss://69d8e81e8ba74d11b1bfa060701cf556.s1.eu.hivemq.cloud:8884/mqtt',
{
username:"hivemq.webclient.1772948203432",
password:"?d6OcSIy38T@0;ojDV,u"
}
)

client.on("connect",()=>{

client.subscribe("esp32/sensor")
client.subscribe("esp32/rfid/scan")

})

let chart1=new Chart(document.getElementById("chart1"),{
type:"line",
data:{labels:[],datasets:[{label:"Temp",data:[]},{label:"Hum",data:[]}]}
})

let chart2=new Chart(document.getElementById("chart2"),{
type:"line",
data:{labels:[],datasets:[{label:"Soil",data:[]}]}
})

client.on("message",(topic,message)=>{

if(topic=="esp32/sensor"){

let data=JSON.parse(message)

document.getElementById("temp").innerText=data.temp
document.getElementById("hum").innerText=data.hum
document.getElementById("soil").innerText=data.soil

let t=new Date().toLocaleTimeString()

chart1.data.labels.push(t)
chart1.data.datasets[0].data.push(data.temp)
chart1.data.datasets[1].data.push(data.hum)

chart2.data.labels.push(t)
chart2.data.datasets[0].data.push(data.soil)

chart1.update()
chart2.update()

}

if(topic=="esp32/rfid/scan"){

let uid=message.toString()

document.getElementById("uid").innerText=uid

let li=document.createElement("li")
li.innerText=uid+" - "+new Date().toLocaleTimeString()

document.getElementById("history").appendChild(li)

}

})

function door(){
client.publish("esp32/doorlock","OPEN")
}

function lamp(n,state){
client.publish("esp32/lamp"+n,state)
}

</script>

</body>

</html>
