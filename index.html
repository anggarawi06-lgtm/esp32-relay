<!DOCTYPE html>

<html>

<head>

<title>ESP32 IoT Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.card{
background:#1e1e1e;
margin:15px;
padding:20px;
border-radius:10px;
display:inline-block;
width:200px;
}

.value{
font-size:28px;
}

button{
width:100px;
height:40px;
margin:5px;
font-size:16px;
}

</style>

</head>

<body>

<h1>ESP32 IoT Dashboard</h1>

<div class="card">
<h3>Suhu</h3>
<div id="suhu" class="value">--</div>
</div>

<div class="card">
<h3>Kelembapan</h3>
<div id="hum" class="value">--</div>
</div>

<div class="card">
<h3>Kelembapan Tanah</h3>
<div id="soil" class="value">--</div>
</div>

<div class="card">
<h3>RFID</h3>
<div id="rfid" class="value">--</div>
</div>

<div class="card">

<h3>Relay</h3>

<button onclick="relayOn()">ON</button> <button onclick="relayOff()">OFF</button>

</div>

<script>

const client = mqtt.connect(
"wss://69d8e81e8ba74d11b1bfa060701cf556.s1.eu.hivemq.cloud:8884/mqtt",
{
username:"hivemq.webclient.1772948203432",
password:"?d6OcSIy38T@0;ojDV,u"
}
)

client.on("connect",function(){

client.subscribe("rumah/suhu")
client.subscribe("rumah/kelembapan")
client.subscribe("rumah/tanah")
client.subscribe("rumah/rfid")

})

client.on("message",function(topic,message){

let data=message.toString()

if(topic=="rumah/suhu"){
document.getElementById("suhu").innerHTML=data+" °C"
}

if(topic=="rumah/kelembapan"){
document.getElementById("hum").innerHTML=data+" %"
}

if(topic=="rumah/tanah"){
document.getElementById("soil").innerHTML=data
}

if(topic=="rumah/rfid"){
document.getElementById("rfid").innerHTML=data
}

})

function relayOn(){
client.publish("rumah/lampu","ON")
}

function relayOff(){
client.publish("rumah/lampu","OFF")
}

</script>

</body>

</html>
