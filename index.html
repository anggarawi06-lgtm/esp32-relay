<!DOCTYPE html>

<html>
<head>

<title>IoT Smart Doorlock</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="sidebar">

<h2>IoT Panel</h2>

<button onclick="showPage('dashboard')">Dashboard</button> <button onclick="showPage('rfid')">RFID Access</button> <button onclick="showPage('password')">Change Password</button>

</div>

<div class="main">

<div id="dashboard" class="page">

<h2>Dashboard</h2>

<div class="cards">

<div class="card">
<h3>RFID Status</h3>
<div id="rfidStatus">-</div>
</div>

<div class="card">
<h3>Suhu</h3>
<div id="temp">-</div>
</div>

<div class="card">
<h3>Kelembapan</h3>
<div id="hum">-</div>
</div>

<div class="card">
<h3>Kelembapan Tanah</h3>
<div id="soil">-</div>
</div>

</div>

<button onclick="openDoor()">Manual Open Door</button>

<div class="charts">

<canvas id="tempChart"></canvas> <canvas id="soilChart"></canvas>

</div>

</div>

<div id="rfid" class="page">

<h2>RFID Access Manager</h2>

<input id="uidInput" placeholder="UID kartu">

<button onclick="addCard()">Tambah</button>

<table>

<thead>
<tr>
<th>UID</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="cardList"></tbody>

</table>

<h3>History Scan</h3>

<table>

<thead>
<tr>
<th>UID</th>
<th>Status</th>
<th>Waktu</th>
</tr>
</thead>

<tbody id="history"></tbody>

</table>

</div>

<div id="password" class="page">

<h2>Change Login</h2>

<input id="newUser" placeholder="username baru">
<input id="newPass" placeholder="password baru">

<button onclick="changeLogin()">Save</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
